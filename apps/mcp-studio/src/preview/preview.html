<!doctype html>
<html lang="en" class="tale-ui" data-color-mode="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Mirror the parent's color mode
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'color-mode') {
          document.documentElement.setAttribute('data-color-mode', e.data.mode);
        }
      });
    </script>
    <style>
      html { font-size: 100%; }
      body { font-size: 1rem; margin: 0; padding: 1rem; }
      #preview-error {
        display: none;
        color: #e53;
        font-family: monospace;
        font-size: 0.8125rem;
        white-space: pre-wrap;
        padding: 1rem;
        background: #fff0f0;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="preview-error"></div>
    <script type="module" src="/src/preview/preview.tsx"></script>
  </body>
</html>
