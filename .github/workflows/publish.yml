name: Publish packages

on:
  push:
    tags:
      - 'release-v*.*.*'
      - 'tokens-v*.*.*'
      - 'css-v*.*.*'
      - 'react-v*.*.*'
      - 'themes-v*.*.*'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which packages to publish'
        required: true
        type: choice
        options:
          - all
          - tokens
          - css
          - react
          - themes
      version:
        description: 'Version without prefix (e.g. 1.2.3)'
        required: true
        type: string
      dist-tag:
        description: 'npm dist-tag to publish under'
        required: false
        default: latest
        type: string
      dry-run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.detect.outputs.scope }}
      version: ${{ steps.detect.outputs.version }}
      dist_tag: ${{ steps.detect.outputs.dist_tag }}
      dry_run: ${{ steps.detect.outputs.dry_run }}
    steps:
      - name: Detect scope and version
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == release-v* ]]; then
              echo "scope=all" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#release-v}" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == tokens-v* ]]; then
              echo "scope=tokens" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#tokens-v}" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == css-v* ]]; then
              echo "scope=css" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#css-v}" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == react-v* ]]; then
              echo "scope=react" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#react-v}" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == themes-v* ]]; then
              echo "scope=themes" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#themes-v}" >> "$GITHUB_OUTPUT"
            else
              echo "Unknown tag prefix: $TAG"
              exit 1
            fi
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "scope=${{ inputs.scope }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "dist_tag=${{ inputs.dist-tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry-run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version
        shell: bash
        run: |
          VERSION="${{ steps.detect.outputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: $VERSION"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### Publish" >> $GITHUB_STEP_SUMMARY
          echo "- **Scope:** ${{ steps.detect.outputs.scope }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.detect.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dist tag:** ${{ steps.detect.outputs.dist_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** ${{ steps.detect.outputs.dry_run }}" >> $GITHUB_STEP_SUMMARY

  publish-tokens:
    needs: resolve
    if: needs.resolve.outputs.scope == 'tokens'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version matches package.json
        shell: bash
        run: |
          EXPECTED="${{ needs.resolve.outputs.version }}"
          ACTUAL=$(node -p "require('./packages/tokens/package.json').version")
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Version mismatch between tag and packages/tokens/package.json"
            exit 1
          fi

      - name: Build and validate @tale-ui/tokens
        run: pnpm --filter @tale-ui/tokens test:package

      - name: Publish @tale-ui/tokens
        if: needs.resolve.outputs.dry_run != 'true'
        run: pnpm --filter @tale-ui/tokens publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run notice
        if: needs.resolve.outputs.dry_run == 'true'
        run: echo "Dry run — skipped npm publish for @tale-ui/tokens@${{ needs.resolve.outputs.version }}"

      - name: Create GitHub release
        if: needs.resolve.outputs.dry_run != 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'tokens-v${{ needs.resolve.outputs.version }}'
          body: |
            Published @tale-ui/tokens v${{ needs.resolve.outputs.version }} to npm.

  publish-css:
    needs: resolve
    if: needs.resolve.outputs.scope == 'css'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version matches package.json
        shell: bash
        run: |
          EXPECTED="${{ needs.resolve.outputs.version }}"
          ACTUAL=$(node -p "require('./packages/css/package.json').version")
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Version mismatch between tag and packages/css/package.json"
            exit 1
          fi

      - name: Build @tale-ui/css
        run: pnpm --filter @tale-ui/css build

      - name: Publish @tale-ui/css
        if: needs.resolve.outputs.dry_run != 'true'
        run: pnpm --filter @tale-ui/css publish --access public --no-git-checks --tag ${{ needs.resolve.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run notice
        if: needs.resolve.outputs.dry_run == 'true'
        run: echo "Dry run — skipped npm publish for @tale-ui/css@${{ needs.resolve.outputs.version }}"

      - name: Build release notes
        id: release_meta
        shell: bash
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          NOTES_FILE="release-notes.md"

          awk -v version="${VERSION}" '
            $0 ~ "^## v" version " - " { found=1; next }
            found && $0 ~ "^## v[0-9]+\\.[0-9]+\\.[0-9]+ - " { exit }
            found { print }
          ' packages/css/CHANGELOG.md > "${NOTES_FILE}"

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "### Changed" > "${NOTES_FILE}"
            echo "- Release css-v${VERSION} of @tale-ui/css." >> "${NOTES_FILE}"
          fi

          SUMMARY=$(grep -m1 '^-' "${NOTES_FILE}" | sed 's/^- //')
          if [ -z "${SUMMARY}" ]; then
            SUMMARY="@tale-ui/css release"
          fi

          echo "title=css-v${VERSION} — ${SUMMARY}" >> "$GITHUB_OUTPUT"
          echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: needs.resolve.outputs.dry_run != 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release_meta.outputs.title }}
          body_path: ${{ steps.release_meta.outputs.notes_path }}

  publish-react:
    needs: resolve
    if: needs.resolve.outputs.scope == 'react' || needs.resolve.outputs.scope == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Synchronize package versions
        run: node scripts/release/sync-package-versions.mjs ${{ needs.resolve.outputs.version }}

      - name: Build and validate @tale-ui/tokens and @tale-ui/css
        run: |
          pnpm --filter @tale-ui/tokens test:package
          pnpm --filter @tale-ui/css test:package

      - name: Build publishable packages
        run: pnpm -r --filter @tale-ui/utils --filter @tale-ui/react build

      - name: Build and validate @tale-ui/themes
        run: pnpm --filter @tale-ui/themes test:package

      - name: Publish @tale-ui/tokens
        if: needs.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if npm view @tale-ui/tokens@"$VERSION" version >/dev/null 2>&1; then
            echo "@tale-ui/tokens@$VERSION already published; skipping"
          else
            pnpm --filter @tale-ui/tokens publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
          fi

      - name: Publish @tale-ui/css
        if: needs.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if npm view @tale-ui/css@"$VERSION" version >/dev/null 2>&1; then
            echo "@tale-ui/css@$VERSION already published; skipping"
          else
            pnpm --filter @tale-ui/css publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
          fi

      - name: Publish @tale-ui/utils
        if: needs.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if npm view @tale-ui/utils@"$VERSION" version >/dev/null 2>&1; then
            echo "@tale-ui/utils@$VERSION already published; skipping"
          else
            pnpm --filter @tale-ui/utils publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
          fi

      - name: Publish @tale-ui/react
        if: needs.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if npm view @tale-ui/react@"$VERSION" version >/dev/null 2>&1; then
            echo "@tale-ui/react@$VERSION already published; skipping"
          else
            pnpm --filter @tale-ui/react publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
          fi

      - name: Publish @tale-ui/react-styles
        if: needs.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if npm view @tale-ui/react-styles@"$VERSION" version >/dev/null 2>&1; then
            echo "@tale-ui/react-styles@$VERSION already published; skipping"
          else
            pnpm --filter @tale-ui/react-styles publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
          fi

      - name: Publish @tale-ui/themes
        if: needs.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if npm view @tale-ui/themes@"$VERSION" version >/dev/null 2>&1; then
            echo "@tale-ui/themes@$VERSION already published; skipping"
          else
            pnpm --filter @tale-ui/themes publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
          fi

      - name: Dry run notice
        if: needs.resolve.outputs.dry_run == 'true'
        run: echo "Dry run — skipped npm publish for scope ${{ needs.resolve.outputs.scope }}@${{ needs.resolve.outputs.version }}"

      - name: Deprecate @tale-ui/core
        if: needs.resolve.outputs.scope == 'all' && needs.resolve.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm deprecate '@tale-ui/core@*' 'Renamed to @tale-ui/css. Replace the dependency and CSS import; no compatibility wrapper is maintained.'

      - name: Create GitHub release
        if: needs.resolve.outputs.dry_run != 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Tale UI ${{ needs.resolve.outputs.scope }} v${{ needs.resolve.outputs.version }}'
          body: |
            Published the Tale UI ${{ needs.resolve.outputs.scope }} release set at v${{ needs.resolve.outputs.version }}.

  publish-themes:
    needs: resolve
    if: needs.resolve.outputs.scope == 'themes'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version matches package.json
        shell: bash
        run: |
          EXPECTED="${{ needs.resolve.outputs.version }}"
          ACTUAL=$(node -p "require('./packages/themes/package.json').version")
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Version mismatch between tag and packages/themes/package.json"
            exit 1
          fi

      - name: Build and validate @tale-ui/themes
        run: pnpm --filter @tale-ui/themes test:package

      - name: Publish @tale-ui/themes
        if: needs.resolve.outputs.dry_run != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if npm view @tale-ui/themes@"$VERSION" version >/dev/null 2>&1; then
            echo "@tale-ui/themes@$VERSION already published; skipping"
          else
            pnpm --filter @tale-ui/themes publish --access public --no-git-checks --provenance --tag ${{ needs.resolve.outputs.dist_tag }}
          fi

      - name: Dry run notice
        if: needs.resolve.outputs.dry_run == 'true'
        run: echo "Dry run — skipped npm publish for @tale-ui/themes@${{ needs.resolve.outputs.version }}"

      - name: Create GitHub release
        if: needs.resolve.outputs.dry_run != 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'themes-v${{ needs.resolve.outputs.version }}'
          body: |
            Published @tale-ui/themes v${{ needs.resolve.outputs.version }} to npm.
