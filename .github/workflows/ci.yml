name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint CSS
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Verify dist is up-to-date
        shell: bash
        run: |
          if ! git diff --quiet packages/css/dist/; then
            echo "dist/style.css is out of date. Run 'pnpm build' and commit the result."
            git diff --stat packages/css/dist/
            exit 1
          fi
