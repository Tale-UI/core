name: CI

on:
  push:
    branches-ignore:
      - 'renovate/**'
      - 'dependabot/**'
  pull_request:

permissions: {}

jobs:
  # Lint and build the CSS design system
  check-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint CSS
        run: pnpm lint:css
      - name: Audit BEM classes
        run: pnpm audit:bem
      - name: Audit docs
        run: pnpm audit:docs
      - name: Audit brand tokens
        run: pnpm audit:brand
      - name: Audit component completeness
        run: pnpm audit:components
      - name: Audit coverage (ComponentAudit, Storybook, A2UI showcase)
        run: pnpm audit:coverage:check
      - name: Verify component registry
        run: pnpm registry:check
      - name: Verify cursor rules
        run: pnpm cursorrules:check
      - name: Audit snippet component kinds
        run: pnpm audit:snippet-kinds
      - name: Validate golden prompts
        run: pnpm golden:validate
      - name: Build CSS
        run: pnpm --filter @tale-ui/core build
      - name: Verify dist is up-to-date
        shell: bash
        run: |
          if ! git diff --quiet packages/css/dist/; then
            echo "dist/style.css is out of date. Run 'pnpm build:css' and commit the result."
            git diff --stat packages/css/dist/
            exit 1
          fi

  # TypeScript, ESLint, and unit tests
  check-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: pnpm typescript
      - name: Unit tests (jsdom)
        run: pnpm test:jsdom

  # A2UI catalog drift prevention
  check-a2ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Verify A2UI catalog docs
        run: pnpm a2ui:check-docs
      - name: Validate A2UI examples
        run: pnpm a2ui:validate-examples
      - name: Audit A2UI docs
        run: pnpm a2ui:audit-docs
      - name: Verify A2UI catalog registry
        run: pnpm a2ui:check-catalog

  # Markdown lint and formatting
  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Markdown lint
        run: pnpm markdownlint
      - name: Prettier
        run: pnpm prettier

  # Tests dev-only scripts across all supported dev environments
  test-dev:
    if: ${{ github.actor != 'l10nbot' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - run: echo "${{ github.actor }}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Use Node.js 22.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22.18'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm release:build
