<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta id="themeMetaTag" name="theme-color" content="#fff" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scale — color scale generator</title>
    <script>
      document.documentElement.setAttribute('data-color-mode', window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
