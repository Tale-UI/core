<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tale UI Vite Playground</title>
    <script>
      // Scale app (Theme Playground) is the authority for data-color-mode.
      // Read persisted bg before Scale mounts to prevent flash.
      localStorage.removeItem('color-mode');
      var bg = localStorage.getItem('scale-bg') || 'light';
      document.documentElement.setAttribute('data-color-mode', bg === 'dark' || bg === 'accent' ? 'dark' : 'light');
    </script>
  </head>
  <body class="tale-ui">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
